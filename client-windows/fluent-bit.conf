# ============================================================
# Windows 客户端：Fluent Bit 采集 Nginx JSON 日志 → Kafka
# ============================================================
# 使用前请修改：
#   1. Path     — 改成你 Windows 上 Nginx 日志的实际路径
#   2. Brokers  — 改成你的日志服务器 IP:端口（现在用 9092）
# ============================================================

[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File parsers.conf
    Log_File     C:\fluent-bit\log\fluent-bit.log

[INPUT]
    Name             tail
    Tag              nginx.access
    Path             C:\nginx\logs\access.log
    DB               C:\fluent-bit\data\flb_nginx.db
    Refresh_Interval 5
    Skip_Long_Lines  On
    Read_from_Head   False

[FILTER]
    Name         parser
    Match        nginx.access
    Key_Name     log
    Parser       nginx_json

# 给每条日志加上固定字段，标识来源
[FILTER]
    Name   modify
    Match  nginx.access
    Add    log_source nginx
    Add    os windows
    Add    node win01

[OUTPUT]
    Name           kafka
    Match          nginx.access
    Brokers        192.168.1.100:9092
    Topics         nginx-logs
    rdkafka.compression.codec gzip
