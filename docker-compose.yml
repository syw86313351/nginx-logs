version: "3.9"

services:
  nginx:
    image: ${NGINX_IMAGE}
    container_name: nginx
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - httpbin
    networks:
      - observability

  httpbin:
    image: kennethreitz/httpbin
    container_name: httpbin
    networks:
      - observability

  kafka:
    image: ${KAFKA_IMAGE}
    container_name: kafka
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "${KAFKA_PORT}:9092"
    networks:
      - observability

  loki:
    image: ${LOKI_IMAGE}
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/data
    networks:
      - observability

  alloy-producer:
    image: ${ALLOY_IMAGE}
    container_name: alloy-producer
    command: >
      run --server.http.listen-addr=0.0.0.0:12345
          --stability.level=experimental
          /etc/alloy/config-producer.alloy
    ports:
      - "${ALLOY_UI_PORT}:12345"
    volumes:
      - ./alloy/config-producer.alloy:/etc/alloy/config-producer.alloy:ro
      - ./nginx/logs:/var/log/nginx:ro
    depends_on:
      - kafka
    networks:
      - observability

  alloy-consumer:
    image: ${ALLOY_IMAGE}
    container_name: alloy-consumer
    command: >
      run --stability.level=experimental
          /etc/alloy/config-consumer.alloy
    volumes:
      - ./alloy/config-consumer.alloy:/etc/alloy/config-consumer.alloy:ro
    depends_on:
      - kafka
      - loki
    networks:
      - observability

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
    depends_on:
      - loki
    networks:
      - observability

volumes:
  loki-data:
  grafana-data:

networks:
  observability:
    name: observability

