# ============================================================
#  Grafana 告警规则 — 通过 Provisioning 自动导入
#  文件路径: grafana/provisioning/alerting/nginx-alerts.yml
# ============================================================

apiVersion: 1

groups:
  - orgId: 1
    name: nginx-alerts
    folder: Nginx
    interval: 1m
    rules:

      # ── 5xx 错误率超阈值 ──────────────────────────────────
      - uid: nginx-alert-5xx-rate
        title: "Nginx 5xx 错误率过高"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki-nginx
            model:
              expr: |
                sum(rate({job="nginx", status_class="5xx"}[5m]))
                /
                sum(rate({job="nginx"}[5m]))
              instant: true
              legendFormat: 5xx_rate
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0.01]   # 超过 1% 触发
                  operator:
                    type: and
                  query:
                    params: [A]
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "5xx 错误率 {{ $value | humanizePercentage }} 超过 1%"
          description: "节点 {{ $labels.node }} 的 5xx 错误率持续 2 分钟超过 1%，请排查上游服务。"
        labels:
          severity: critical

      # ── P99 响应时间超阈值 ────────────────────────────────
      - uid: nginx-alert-p99-latency
        title: "Nginx P99 响应时间过高"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki-nginx
            model:
              expr: |
                quantile_over_time(0.99,
                  {job="nginx"} | json | unwrap request_time [5m])
              instant: true
              legendFormat: p99_latency
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [3]      # 超过 3 秒触发
                  operator:
                    type: and
                  query:
                    params: [A]
        noDataState: NoData
        execErrState: Error
        for: 3m
        annotations:
          summary: "P99 响应时间 {{ $value }}s 超过 3s"
          description: "P99 响应时间持续 3 分钟超过 3 秒，请检查上游服务或慢查询。"
        labels:
          severity: warning

      # ── 节点无日志（掉线检测）────────────────────────────
      - uid: nginx-alert-node-silent
        title: "Nginx 节点日志中断"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki-nginx
            model:
              expr: |
                sum by (node) (
                  count_over_time({job="nginx"}[5m])
                )
              instant: true
              legendFormat: "{{node}}"
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: lt
                    params: [1]      # 5 分钟内无日志
                  operator:
                    type: and
                  query:
                    params: [A]
        noDataState: Alerting        # 无数据本身就是告警
        execErrState: Error
        for: 5m
        annotations:
          summary: "节点 {{ $labels.node }} 超过 5 分钟无日志"
          description: "可能原因：Vector Agent 停止、Kafka 连接断开、nginx 停止服务。"
        labels:
          severity: warning

      # ── 请求量骤降（流量异常）────────────────────────────
      - uid: nginx-alert-traffic-drop
        title: "Nginx 请求量骤降"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: loki-nginx
            model:
              expr: |
                (
                  sum(rate({job="nginx"}[5m]))
                  /
                  sum(rate({job="nginx"}[30m] offset 5m))
                ) < 0.3
              instant: true
              legendFormat: traffic_ratio
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: lt
                    params: [1]      # 比值 < 0.3 即流量降至 30% 以下
                  operator:
                    type: and
                  query:
                    params: [A]
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "请求量骤降至正常水平的 {{ $value | humanizePercentage }}"
          description: "当前 5 分钟 QPS 相比 30 分钟前下降超过 70%，可能存在服务中断或 LB 摘流。"
        labels:
          severity: warning
