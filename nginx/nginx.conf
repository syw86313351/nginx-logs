worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 结构化 JSON 日志，字段涵盖时间、客户端、上游、请求、连接、SSL 等多个维度
    log_format json_analytics escape=json '{'
      # 时间维度
      '"time_iso8601":"$time_iso8601",'              # 日志时间（ISO8601）
      '"msec":"$msec",'                              # 日志时间（秒.毫秒），便于排序
      '"request_time":$request_time,'                # 整个请求从接收到发送完响应的总耗时
      '"upstream_response_time":"$upstream_response_time",'  # 上游响应时间（多 upstream 时为逗号分隔）
      '"upstream_connect_time":"$upstream_connect_time",'    # 与上游建立 TCP 连接耗时
      '"upstream_header_time":"$upstream_header_time",'      # 上游返回首字节 header 的耗时
      '"upstream_status":"$upstream_status",'        # 上游返回的 HTTP 状态码（多 upstream 时逗号分隔）

      # 客户端维度
      '"remote_addr":"$remote_addr",'                # 客户端 IP（可能是代理 IP）
      '"remote_port":"$remote_port",'                # 客户端端口
      '"x_forwarded_for":"$http_x_forwarded_for",'   # X-Forwarded-For 头部（经多级代理透传）
      '"x_real_ip":"$http_x_real_ip",'               # X-Real-IP 头部（上游或 LB 透传的真实 IP）

      # Nginx 实例 / 虚拟主机维度
      '"node":"ws01",'                               # 固定标识当前主机/实例名，便于在 Loki/Grafana 中区分节点
      '"server_addr":"$server_addr",'                # 当前 Nginx 监听的本地 IP
      '"server_port":"$server_port",'                # 当前 Nginx 监听的本地端口
      '"server_name":"$server_name",'                # 命中的 server_name（虚拟主机）

      # 请求行维度
      '"scheme":"$scheme",'                          # 请求协议方案 http/https
      '"host":"$host",'                              # Host 头部（域名）
      '"request_method":"$request_method",'          # 请求方法 GET/POST 等
      '"request_uri":"$request_uri",'                # 原始请求 URI（含查询参数）
      '"uri":"$uri",'                                # 规范化后的 URI（不含查询参数）
      '"args":"$args",'                              # 查询字符串（? 之后的部分）
      '"protocol":"$server_protocol",'               # HTTP 协议版本，例如 HTTP/1.1

      # 响应与大小
      '"status":$status,'                            # 返回给客户端的 HTTP 状态码
      '"body_bytes_sent":$body_bytes_sent,'          # 发送给客户端的响应体字节数
      '"bytes_sent":$bytes_sent,'                    # 发送给客户端的总字节数（含 header）
      '"request_length":$request_length,'            # 请求报文总大小（含请求行+头+体）

      # HTTP 头部与追踪
      '"http_referer":"$http_referer",'              # Referer 头
      '"http_user_agent":"$http_user_agent",'        # User-Agent 头
      '"http_x_request_id":"$http_x_request_id",'    # 来自上游的 X-Request-Id
      '"request_id":"$request_id",'                  # Nginx 生成的 request_id（需开启模块）

      # 连接维度
      '"connection":"$connection",'                  # 连接 ID（同一 TCP 连接内多个请求相同）

      # SSL 维度（HTTPS 时有值）
      '"ssl_protocol":"$ssl_protocol",'              # SSL/TLS 协议版本
      '"ssl_cipher":"$ssl_cipher",'                  # 使用的对称加密套件
      '"ssl_server_name":"$ssl_server_name"'         # SNI 中的服务器名称
    '}';

  access_log /var/log/nginx/access.log json_analytics;

    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # include extra sites
    include /etc/nginx/conf.d/*.conf;
}

